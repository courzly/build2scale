<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konzept — Blueprint Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
<style>
:root {
  --dark: #0f1117; --darker: #080a0f; --card: #161b27; --card2: #1c2333;
  --accent: #0d9488; --accent2: #2dd4bf; --gold: #f59e0b; --green: #10b981;
  --red: #ef4444; --text: #e2e8f0; --muted: #64748b; --border: #1e2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--darker); color: var(--text); line-height: 1.6; }
body.light {
  --darker: #f8fafc; --dark: #f1f5f9; --card: #ffffff; --card2: #f8fafc;
  --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
  --accent2: #0f766e; --gold: #d97706; --green: #059669; --red: #dc2626;
}
.nav { background: rgba(8,10,15,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
body.light .nav { background: rgba(255,255,255,0.95); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; gap: 8px; height: 52px; }
.nav-brand { text-decoration: none; display: flex; align-items: center; gap: 8px; margin-right: 12px; }
.nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
.nav-brand-text { font-size: 13px; font-weight: 700; color: var(--text); }
.nav-sep { color: var(--border); font-size: 18px; margin: 0 4px; }
.nav-links { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
.nav-link { text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); }
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
body.light .nav-link:hover { background: rgba(0,0,0,0.05); }
.nav-link.active { color: var(--accent2); background: rgba(13,148,136,0.12); font-weight: 600; }
body.light .nav-link.active { color: #0f766e; }
.theme-toggle { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hero { background: linear-gradient(135deg, #0f1117 0%, #0d2420 50%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 40px 40px 32px; }
body.light .hero { background: linear-gradient(135deg, #f0fdf9 0%, #ccfbf1 50%, #f0fdf9 100%); border-bottom-color: #e2e8f0; }
.hero-inner { max-width: 1100px; margin: 0 auto; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.3); color: var(--accent2); padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
.hero h1 { font-size: clamp(22px, 3vw, 34px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 8px; }
.hero h1 span { color: var(--accent2); }
.hero-sub { color: var(--muted); font-size: 13px; }
.container { max-width: 1100px; margin: 0 auto; padding: 32px 40px; }
.section { margin-bottom: 48px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.section-num { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background: rgba(13,148,136,0.12); border: 1px solid rgba(13,148,136,0.25); border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }
.section-title { font-size: 18px; font-weight: 700; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
.stat-value { font-size: 30px; font-weight: 800; color: var(--accent2); letter-spacing: -0.02em; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.b { display:inline-flex; align-items:center; font-size:11px; font-weight:700; padding:2px 7px; border-radius:100px; white-space:nowrap; }
.b-mvp  { background:rgba(16,185,129,0.12);  color:#10b981; border:1px solid rgba(16,185,129,0.25); }
.b-post { background:rgba(100,116,139,0.1);  color:#94a3b8; border:1px solid rgba(100,116,139,0.2); }
/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--card2); }
.tbl td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(255,255,255,0.02); }
body.light .tbl tr:hover td { background: rgba(0,0,0,0.02); }
.tbl-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
/* Domain cards */
.domain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
.domain-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.domain-card-label { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.domain-card-url { font-size: 12px; color: var(--accent2); font-family: monospace; margin-bottom: 10px; }
.domain-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.domain-card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.footer { border-top: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 13px; }
@media (max-width: 768px) {
  .hero, .container, .footer { padding-left: 20px; padding-right: 20px; }
  .nav-inner { padding: 0 16px; }
  .tbl { display: block; overflow-x: auto; }
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-dot"></div>
      <span id="nav-brand-text" class="nav-brand-text">Blueprint Viewer</span>
    </a>
    <span class="nav-sep">|</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link">← Projekte</a>
      <a href="#" id="nav-konzept" class="nav-link active">Konzept</a>
      <a href="#" id="nav-backlog" class="nav-link">Backlog</a>
      <a href="#" id="nav-phasen" class="nav-link">Phasen</a>
      <a href="#" id="nav-fragen" class="nav-link">Fragen</a>
    </div>
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Theme wechseln">☀️</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">Konzept</div>
    <h1>Module, Domains <span>&amp; Rollen</span></h1>
    <p class="hero-sub" id="hero-sub">Projektarchitektur im Überblick</p>
  </div>
</div>

<div class="container">
  <div id="content"><div style="text-align:center;padding:60px;color:var(--muted)">Wird geladen…</div></div>
</div>

<footer class="footer">
  <span id="footer-project">Blueprint Viewer</span>
  <span>Konzept</span>
</footer>

<script>
function toggleTheme(){
  var l=document.body.classList.toggle('light');
  localStorage.setItem('theme',l?'light':'dark');
  document.getElementById('theme-toggle-btn').textContent=l?'🌙':'☀️';
}
document.addEventListener('DOMContentLoaded',function(){
  if(document.body.classList.contains('light'))
    document.getElementById('theme-toggle-btn').textContent='🌙';
});

const PROJECT = new URLSearchParams(location.search).get('project') || '';
const QS = PROJECT ? '?project=' + PROJECT : '';

function setupNav() {
  document.getElementById('nav-backlog').href  = 'backlog.html'  + QS;
  document.getElementById('nav-phasen').href   = 'phasen.html'   + QS;
  document.getElementById('nav-konzept').href  = 'konzept.html'  + QS;
  document.getElementById('nav-fragen').href   = 'fragen.html'   + QS;
}
setupNav();

if (!PROJECT) {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Kein Projekt ausgewählt. <a href="index.html" style="color:var(--accent2)">Zur Projektübersicht</a></div>';
} else {
  const BASE = '../' + PROJECT + '/api/v1';

  Promise.all([
    fetch(BASE + '/index.json').then(r => r.json()),
    fetch(BASE + '/modules.json').then(r => r.json()),
    fetch(BASE + '/roles.json').then(r => r.json()),
    fetch(BASE + '/domains.json').then(r => r.json()),
  ]).then(([idx, modulesData, rolesData, domainsData]) => {
    document.getElementById('nav-brand-text').textContent = idx.api.replace(' Blueprint API','').replace(' Platform','');
    document.getElementById('footer-project').textContent = idx.api.replace(' Blueprint API','');
    document.getElementById('hero-sub').textContent = idx.description || 'Projektarchitektur im Überblick';

    renderKonzept(idx, modulesData, rolesData, domainsData);
  }).catch(err => {
    document.getElementById('content').innerHTML = `<div style="text-align:center;padding:60px;color:var(--red)">Fehler beim Laden: ${err.message}</div>`;
  });
}

function renderKonzept(idx, modulesData, rolesData, domainsData) {
  const stats = idx.stats || {};
  const modules = modulesData.modules || [];
  const groups  = modulesData.groups  || [];
  const roles   = (rolesData.roles  || rolesData) || [];
  const domains = (domainsData.domains || domainsData) || [];

  let html = '';

  // 1. Projekt-Info
  html += `<div class="section">
    <div class="section-header">
      <div class="section-num">1</div>
      <div class="section-title">Projekt-Info</div>
    </div>
    <div class="stats-row">
      ${stats.total_stories   !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.total_stories}</div><div class="stat-label">User Stories</div></div>` : ''}
      ${stats.mvp_stories     !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.mvp_stories}</div><div class="stat-label">MVP Stories</div></div>` : ''}
      ${stats.post_mvp_stories !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.post_mvp_stories}</div><div class="stat-label">Post-MVP Stories</div></div>` : ''}
      ${stats.modules  !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.modules}</div><div class="stat-label">Module</div></div>` : ''}
      ${stats.phases   !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.phases}</div><div class="stat-label">Phasen</div></div>` : ''}
      ${stats.roles    !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.roles}</div><div class="stat-label">Rollen</div></div>` : ''}
      ${stats.domains  !== undefined ? `<div class="stat-card"><div class="stat-value">${stats.domains}</div><div class="stat-label">Domains</div></div>` : ''}
    </div>
    ${idx.blueprint_version ? `<p style="font-size:13px;color:var(--muted);margin-top:12px">Blueprint Version ${idx.blueprint_version} · ${idx.description || ''}</p>` : ''}
  </div>`;

  // 2. Module
  const groupMap = Object.fromEntries(groups.map(g => [g.id, g]));
  html += `<div class="section">
    <div class="section-header">
      <div class="section-num">2</div>
      <div class="section-title">Module</div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Gruppe</th>
            <th>ID</th>
            <th>Modul</th>
            <th>Scope</th>
            <th>MVP Stories</th>
            <th>Post-MVP</th>
          </tr>
        </thead>
        <tbody>`;

  modules.forEach(m => {
    const g = groupMap[m.group_id];
    html += `<tr>
      <td style="color:var(--muted)">${g ? g.id + ' — ' + g.label.split('—')[0].trim() : m.group_id || '—'}</td>
      <td><code style="font-family:monospace;font-size:12px;color:var(--accent2)">${m.id}</code></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          ${m.icon ? `<span>${m.icon}</span>` : ''}
          <div>
            <div style="font-weight:600">${m.name}</div>
            ${m.description ? `<div style="font-size:11px;color:var(--muted)">${m.description}</div>` : ''}
          </div>
        </div>
      </td>
      <td><span class="b b-${m.scope==='MVP'?'mvp':'post'}">${m.scope||'—'}</span></td>
      <td style="font-weight:600;color:var(--green)">${(m.mvp_story_ids||[]).length || 0}</td>
      <td style="color:var(--muted)">${(m.post_mvp_story_ids||[]).length || 0}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  // 3. Domains
  html += `<div class="section">
    <div class="section-header">
      <div class="section-num">3</div>
      <div class="section-title">Domains / Portale</div>
    </div>
    <div class="domain-grid">`;

  domains.forEach(d => {
    html += `<div class="domain-card">
      <div class="domain-card-label">${d.label}</div>
      ${d.url ? `<div class="domain-card-url">${d.url}</div>` : ''}
      <div class="domain-card-meta">
        <span class="b" style="background:${d.auth_required?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)'};color:${d.auth_required?'#f87171':'#10b981'};border:1px solid ${d.auth_required?'rgba(239,68,68,0.25)':'rgba(16,185,129,0.25)'}">
          ${d.auth_required ? '🔒 Auth' : '🌐 Public'}
        </span>
        ${(d.allowed_roles||[]).map(r=>`<span class="b" style="background:rgba(99,102,241,0.1);color:#818cf8;border:1px solid rgba(99,102,241,0.2)">${r}</span>`).join('')}
        ${(d.story_ids||[]).length ? `<span style="font-size:11px;color:var(--muted)">${d.story_ids.length} Stories</span>` : ''}
      </div>
      ${d.description ? `<div class="domain-card-desc">${d.description}</div>` : ''}
    </div>`;
  });

  html += `</div></div>`;

  // 4. Rollen
  html += `<div class="section">
    <div class="section-header">
      <div class="section-num">4</div>
      <div class="section-title">Rollen &amp; Berechtigungen</div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Rolle</th>
            <th>Beschreibung</th>
            <th>Domain-Zugriff</th>
            <th>Stories</th>
          </tr>
        </thead>
        <tbody>`;

  const roleList = Array.isArray(roles) ? roles : (roles.roles || []);
  roleList.forEach(r => {
    html += `<tr>
      <td>
        <div style="font-weight:700">${r.label || r.id}</div>
        <div style="font-size:11px;color:var(--muted);font-family:monospace">${r.id}</div>
      </td>
      <td style="color:var(--muted);max-width:320px">${r.description || '—'}</td>
      <td>${(r.domain_access||[]).map(d=>`<span class="b" style="background:rgba(13,148,136,0.1);color:var(--accent2);border:1px solid rgba(13,148,136,0.2)">${d}</span>`).join(' ')}</td>
      <td style="color:var(--muted)">${(r.story_ids||[]).length || 0}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
