<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint Viewer — Alle Projekte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
<style>
:root {
  --dark: #0f1117; --darker: #080a0f; --card: #161b27; --card2: #1c2333;
  --accent: #0d9488; --accent2: #2dd4bf; --gold: #f59e0b; --green: #10b981;
  --red: #ef4444; --text: #e2e8f0; --muted: #64748b; --border: #1e2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--darker); color: var(--text); line-height: 1.6; }
body.light {
  --darker: #f8fafc; --dark: #f1f5f9; --card: #ffffff; --card2: #f8fafc;
  --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
  --accent2: #0f766e; --gold: #d97706; --green: #059669; --red: #dc2626;
}
.nav { background: rgba(8,10,15,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
body.light .nav { background: rgba(255,255,255,0.95); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; gap: 8px; height: 52px; }
.nav-brand { text-decoration: none; display: flex; align-items: center; gap: 8px; margin-right: 12px; }
.nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
.nav-brand-text { font-size: 13px; font-weight: 700; color: var(--text); }
.nav-sep { color: var(--border); font-size: 18px; margin: 0 4px; }
.nav-links { display: flex; align-items: center; gap: 2px; }
.nav-link { text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); }
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
body.light .nav-link:hover { background: rgba(0,0,0,0.05); }
.nav-link.active { color: var(--accent2); background: rgba(13,148,136,0.12); font-weight: 600; }
body.light .nav-link.active { color: #0f766e; }
.theme-toggle { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hero { background: linear-gradient(135deg, #0f1117 0%, #0d2420 50%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 48px 40px 40px; }
body.light .hero { background: linear-gradient(135deg, #f0fdf9 0%, #ccfbf1 50%, #f0fdf9 100%); border-bottom-color: #e2e8f0; }
.hero-inner { max-width: 1100px; margin: 0 auto; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.3); color: var(--accent2); padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; }
.hero h1 { font-size: clamp(24px, 3.5vw, 40px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px; }
.hero h1 span { color: var(--accent2); }
.hero-sub { color: var(--muted); font-size: 14px; max-width: 600px; }
.container { max-width: 1100px; margin: 0 auto; padding: 40px; }
/* Category sections */
.category-section { margin-bottom: 48px; }
.category-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.category-icon-wrap { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.category-icon-wrap.mvp { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); }
.category-icon-wrap.build { background: rgba(13,148,136,0.12); border: 1px solid rgba(13,148,136,0.25); }
.category-header-body {}
.category-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }
.category-title.mvp { color: #818cf8; }
.category-title.build { color: var(--accent2); }
body.light .category-title.mvp { color: #4f46e5; }
body.light .category-title.build { color: #0f766e; }
.category-desc { font-size: 13px; color: var(--muted); }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
.project-card { text-decoration: none; display: flex; align-items: flex-start; gap: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: border-color 0.2s, transform 0.15s; }
.project-card:hover { transform: translateY(-2px); }
.project-card-icon { font-size: 36px; flex-shrink: 0; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; background: var(--card2); border-radius: 12px; }
.project-card-body { flex: 1; min-width: 0; }
.project-card-name { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.type-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 100px; }
.type-badge.mvp { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: #818cf8; }
.type-badge.build { background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.25); color: var(--accent2); }
body.light .type-badge.mvp { color: #4f46e5; }
body.light .type-badge.build { color: #0f766e; }
.project-card-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.project-card-stats { display: flex; gap: 16px; margin-bottom: 14px; }
.project-card-stats span { font-size: 12px; font-weight: 600; color: var(--muted); }
.project-card-links { display: flex; gap: 6px; flex-wrap: wrap; }
.project-card-links a { font-size: 12px; font-weight: 600; padding: 4px 10px; background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.2); color: var(--accent2); border-radius: 6px; text-decoration: none; }
.project-card-links a:hover { background: rgba(13,148,136,0.2); }
body.light .project-card-links a { color: #0f766e; }
.project-arrow { color: var(--accent2); font-size: 20px; flex-shrink: 0; align-self: center; }
.footer { border-top: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 13px; }
.loading { text-align: center; padding: 60px; color: var(--muted); }
@media (max-width: 768px) {
  .hero, .container, .footer { padding-left: 20px; padding-right: 20px; }
  .nav-inner { padding: 0 16px; }
  .projects-grid { grid-template-columns: 1fr; }
  .project-card { flex-direction: column; }
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-dot"></div>
      <span class="nav-brand-text">Blueprint Viewer</span>
    </a>
    <span class="nav-sep">|</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Alle Projekte</a>
    </div>
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Theme wechseln">☀️</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">
      <span>Build 2 Scale</span>
    </div>
    <h1>Blueprint <span>Viewer</span></h1>
    <p class="hero-sub">Alle aktiven Projekte — MVP-Validierungen und Build-Projekte auf einen Blick.</p>
  </div>
</div>

<div class="container">
  <div id="projects-root">
    <div class="loading">Projekte werden geladen…</div>
  </div>
</div>

<footer class="footer">
  <span>Build 2 Scale · Blueprint Viewer</span>
  <span id="footer-count"></span>
</footer>

<script>
function toggleTheme(){
  var l=document.body.classList.toggle('light');
  localStorage.setItem('theme',l?'light':'dark');
  document.getElementById('theme-toggle-btn').textContent=l?'🌙':'☀️';
}
document.addEventListener('DOMContentLoaded',function(){
  if(document.body.classList.contains('light'))
    document.getElementById('theme-toggle-btn').textContent='🌙';
});

function renderCard(p) {
  const stats = p.stats || {};
  const color = p.color || '#0d9488';
  const type = p.type || 'build';
  return `
    <a href="backlog.html?project=${p.id}" class="project-card" style="border-color:${color}33">
      <div class="project-card-icon">${p.icon || '📦'}</div>
      <div class="project-card-body">
        <div class="project-card-name">
          ${p.name}
          <span class="type-badge ${type}">${type === 'mvp' ? 'MVP' : 'Build'}</span>
        </div>
        <div class="project-card-desc">${p.description}</div>
        <div class="project-card-stats">
          ${stats.total_stories ? `<span>${stats.total_stories} Stories</span>` : ''}
          ${stats.phases ? `<span>${stats.phases} Phasen</span>` : ''}
          ${stats.modules ? `<span>${stats.modules} Module</span>` : ''}
          ${p.blueprint_version ? `<span>v${p.blueprint_version}</span>` : ''}
        </div>
        <div class="project-card-links">
          <a href="konzept.html?project=${p.id}" onclick="event.stopPropagation()">Konzept</a>
          <a href="backlog.html?project=${p.id}" onclick="event.stopPropagation()">Backlog</a>
          <a href="phasen.html?project=${p.id}" onclick="event.stopPropagation()">Phasen</a>
          <a href="fragen.html?project=${p.id}" onclick="event.stopPropagation()">Fragen</a>
        </div>
      </div>
      <div class="project-arrow">→</div>
    </a>`;
}

function renderSection(type, projects) {
  if (!projects.length) return '';
  const isMvp = type === 'mvp';
  const title = isMvp ? 'MVP Projekte' : 'Build Projekte';
  const icon = isMvp ? '🧪' : '🏗️';
  const desc = isMvp
    ? 'Ideen-Validierung — wir testen Annahmen bevor Zeit und Geld in Entwicklung fliesst.'
    : 'Digitale Produkte — wir bauen funktionierende Webapps, Plattformen und SaaS-Lösungen.';
  return `
    <div class="category-section">
      <div class="category-header">
        <div class="category-icon-wrap ${type}">${icon}</div>
        <div class="category-header-body">
          <div class="category-title ${type}">${title}</div>
          <div class="category-desc">${desc}</div>
        </div>
      </div>
      <div class="projects-grid">
        ${projects.map(renderCard).join('')}
      </div>
    </div>`;
}

fetch('../projects.json')
  .then(r => { if (!r.ok) throw new Error('projects.json nicht gefunden'); return r.json(); })
  .then(projects => {
    return Promise.all(projects.map(p =>
      fetch(p.path + '/index.json')
        .then(r => r.json())
        .then(idx => ({ ...p, stats: idx.stats, blueprint_version: idx.blueprint_version }))
        .catch(() => ({ ...p, stats: null, blueprint_version: '?' }))
    ));
  })
  .then(projects => {
    const root = document.getElementById('projects-root');
    document.getElementById('footer-count').textContent = projects.length + ' Projekte';
    const mvp = projects.filter(p => p.type === 'mvp');
    const build = projects.filter(p => p.type === 'build');
    root.innerHTML = renderSection('mvp', mvp) + renderSection('build', build);
  })
  .catch(err => {
    document.getElementById('projects-root').innerHTML = `<div class="loading" style="color:var(--red)">Fehler beim Laden: ${err.message}</div>`;
  });
</script>
</body>
</html>
