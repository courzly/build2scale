<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phasen — Blueprint Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
<style>
:root {
  --dark: #0f1117; --darker: #080a0f; --card: #161b27; --card2: #1c2333;
  --accent: #0d9488; --accent2: #2dd4bf; --gold: #f59e0b; --green: #10b981;
  --red: #ef4444; --text: #e2e8f0; --muted: #64748b; --border: #1e2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--darker); color: var(--text); line-height: 1.6; }
body.light {
  --darker: #f8fafc; --dark: #f1f5f9; --card: #ffffff; --card2: #f8fafc;
  --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
  --accent2: #0f766e; --gold: #d97706; --green: #059669; --red: #dc2626;
}
.nav { background: rgba(8,10,15,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
body.light .nav { background: rgba(255,255,255,0.95); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; gap: 8px; height: 52px; }
.nav-brand { text-decoration: none; display: flex; align-items: center; gap: 8px; margin-right: 12px; }
.nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
.nav-brand-text { font-size: 13px; font-weight: 700; color: var(--text); }
.nav-sep { color: var(--border); font-size: 18px; margin: 0 4px; }
.nav-links { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
.nav-link { text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted); }
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
body.light .nav-link:hover { background: rgba(0,0,0,0.05); }
.nav-link.active { color: var(--accent2); background: rgba(13,148,136,0.12); font-weight: 600; }
body.light .nav-link.active { color: #0f766e; }
.theme-toggle { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.hero { background: linear-gradient(135deg, #0f1117 0%, #0d2420 50%, #0f1117 100%); border-bottom: 1px solid var(--border); padding: 40px 40px 32px; }
body.light .hero { background: linear-gradient(135deg, #f0fdf9 0%, #ccfbf1 50%, #f0fdf9 100%); border-bottom-color: #e2e8f0; }
.hero-inner { max-width: 1100px; margin: 0 auto; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.3); color: var(--accent2); padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
.hero h1 { font-size: clamp(22px, 3vw, 34px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 8px; }
.hero h1 span { color: var(--accent2); }
.hero-sub { color: var(--muted); font-size: 13px; }
.container { max-width: 1100px; margin: 0 auto; padding: 32px 40px; }
.b { display:inline-flex; align-items:center; font-size:11px; font-weight:700; padding:2px 7px; border-radius:100px; white-space:nowrap; }
.b-mvp  { background:rgba(16,185,129,0.12);  color:#10b981; border:1px solid rgba(16,185,129,0.25); }
.b-post { background:rgba(100,116,139,0.1);  color:#94a3b8; border:1px solid rgba(100,116,139,0.2); }
.b-p1 { background:rgba(99,102,241,0.12);   color:#818cf8; border:1px solid rgba(99,102,241,0.25); }
.b-p2 { background:rgba(20,184,166,0.12);   color:#2dd4bf; border:1px solid rgba(20,184,166,0.25); }
.b-p3 { background:rgba(34,197,94,0.12);    color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
.b-p4 { background:rgba(245,158,11,0.12);   color:#fbbf24; border:1px solid rgba(245,158,11,0.25); }
.b-p5 { background:rgba(249,115,22,0.12);   color:#fb923c; border:1px solid rgba(249,115,22,0.25); }
.b-p6 { background:rgba(168,85,247,0.12);   color:#c084fc; border:1px solid rgba(168,85,247,0.25); }
.b-xs { background:rgba(100,116,139,0.08); color:#94a3b8; border:1px solid rgba(100,116,139,0.15); }
.b-s  { background:rgba(20,184,166,0.08);  color:#2dd4bf; border:1px solid rgba(20,184,166,0.15); }
.b-m  { background:rgba(245,158,11,0.08);  color:#fbbf24; border:1px solid rgba(245,158,11,0.15); }
.b-l  { background:rgba(239,68,68,0.08);   color:#f87171; border:1px solid rgba(239,68,68,0.15); }
/* Phase overview grid */
.phases-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 40px; }
.phase-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: border-color 0.15s; text-decoration: none; display: block; }
.phase-chip:hover { border-color: var(--accent); }
.phase-chip-id { font-size: 18px; font-weight: 800; color: var(--accent2); margin-bottom: 4px; }
.phase-chip-name { font-size: 11px; color: var(--muted); line-height: 1.35; margin-bottom: 6px; }
.phase-chip-meta { font-size: 11px; color: var(--muted); }
/* Phase section */
.phase-section { margin-bottom: 48px; }
.phase-hdr { background: rgba(13,148,136,0.06); border: 1px solid rgba(13,148,136,0.2); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
.phase-hdr-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.story-row { display:flex; align-items:flex-start; gap:14px; padding:10px 14px; border-bottom:1px solid var(--border); }
.story-row:last-child { border-bottom:none; }
.milestone-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.milestone { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 12px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 100px; color: var(--gold); }
.footer { border-top: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 13px; }
@media (max-width: 768px) {
  .hero, .container, .footer { padding-left: 20px; padding-right: 20px; }
  .nav-inner { padding: 0 16px; }
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-dot"></div>
      <span id="nav-brand-text" class="nav-brand-text">Blueprint Viewer</span>
    </a>
    <span class="nav-sep">|</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link">← Projekte</a>
      <a href="#" id="nav-konzept" class="nav-link">Konzept</a>
      <a href="#" id="nav-backlog" class="nav-link">Backlog</a>
      <a href="#" id="nav-phasen" class="nav-link active">Phasen</a>
      <a href="#" id="nav-fragen" class="nav-link">Fragen</a>
    </div>
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Theme wechseln">☀️</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">Phasenplan</div>
    <h1>Implementierungs<span>phasen</span></h1>
    <p class="hero-sub" id="hero-sub">Chronologischer Umsetzungsplan mit Meilensteinen</p>
  </div>
</div>

<div class="container">
  <div id="content"><div style="text-align:center;padding:60px;color:var(--muted)">Wird geladen…</div></div>
</div>

<footer class="footer">
  <span id="footer-project">Blueprint Viewer</span>
  <span>Phasenplan</span>
</footer>

<script>
function toggleTheme(){
  var l=document.body.classList.toggle('light');
  localStorage.setItem('theme',l?'light':'dark');
  document.getElementById('theme-toggle-btn').textContent=l?'🌙':'☀️';
}
document.addEventListener('DOMContentLoaded',function(){
  if(document.body.classList.contains('light'))
    document.getElementById('theme-toggle-btn').textContent='🌙';
});

const PROJECT = new URLSearchParams(location.search).get('project') || '';
const QS = PROJECT ? '?project=' + PROJECT : '';

function setupNav() {
  document.getElementById('nav-backlog').href  = 'backlog.html'  + QS;
  document.getElementById('nav-phasen').href   = 'phasen.html'   + QS;
  document.getElementById('nav-konzept').href  = 'konzept.html'  + QS;
  document.getElementById('nav-fragen').href   = 'fragen.html'   + QS;
}
setupNav();

if (!PROJECT) {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Kein Projekt ausgewählt. <a href="index.html" style="color:var(--accent2)">Zur Projektübersicht</a></div>';
} else {
  const BASE = '../' + PROJECT + '/api/v1';

  Promise.all([
    fetch(BASE + '/index.json').then(r => r.json()),
    fetch(BASE + '/phases.json').then(r => r.json()),
    fetch(BASE + '/stories.json').then(r => r.json()),
  ]).then(([idx, phasesData, storiesData]) => {
    document.getElementById('nav-brand-text').textContent = idx.api.replace(' Blueprint API','').replace(' Platform','');
    document.getElementById('footer-project').textContent = idx.api.replace(' Blueprint API','');
    document.getElementById('hero-sub').textContent = 'Implementierungsplan für ' + idx.api.replace(' Blueprint API','');

    const phases   = phasesData.phases;
    const storyMap = Object.fromEntries(storiesData.stories.map(s => [s.id, s]));

    renderPhasen(phases, storyMap);
  }).catch(err => {
    document.getElementById('content').innerHTML = `<div style="text-align:center;padding:60px;color:var(--red)">Fehler beim Laden: ${err.message}</div>`;
  });
}

function getPhaseCls(phaseId) {
  const map = { P1:'b-p1', P2:'b-p2', P3:'b-p3', P4:'b-p4', P5:'b-p5', P6:'b-p6' };
  return map[phaseId] || 'b-mvp';
}

function renderPhasen(phases, storyMap) {
  let html = '';

  // Overview chips
  html += '<div class="phases-overview">';
  phases.forEach(p => {
    html += `<a href="#phase-${p.id}" class="phase-chip">
      <div class="phase-chip-id">${p.id}</div>
      <div class="phase-chip-name">${p.name}</div>
      <div class="phase-chip-meta">Woche ${p.weeks} · ${p.story_count || (p.story_ids||[]).length} Stories</div>
    </a>`;
  });
  html += '</div>';

  // Phase sections
  phases.forEach(p => {
    const stories = (p.story_ids || []).map(id => storyMap[id]).filter(Boolean);
    const phaseCls = getPhaseCls(p.id);

    html += `<div class="phase-section" id="phase-${p.id}">
      <div class="phase-hdr">
        <div class="phase-hdr-top">
          <span class="b ${phaseCls}">${p.id}</span>
          <strong style="font-size:16px;font-weight:700">${p.name}</strong>
          <span style="color:var(--muted);font-size:13px">Woche ${p.weeks}</span>
          <span style="color:var(--muted);font-size:13px">${stories.length} Stories</span>
        </div>
        <p style="font-size:13px;color:var(--muted);margin-top:4px">${p.goal || ''}</p>
        ${(p.milestones||[]).length ? `<div class="milestone-list">${(p.milestones||[]).map(m=>`<span class="milestone">🏁 ${m.label}</span>`).join('')}</div>` : ''}
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">`;

    if (stories.length === 0) {
      html += `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Keine Stories für diese Phase</div>`;
    } else {
      stories.forEach(s => {
        const sizeCls = s.size ? 'b-' + s.size.toLowerCase() : '';
        html += `<div class="story-row">
          <a href="backlog.html?project=${PROJECT}#${s.id}" style="font-size:11px;font-family:monospace;color:var(--accent2);text-decoration:none;width:72px;flex-shrink:0;padding-top:2px">${s.id}</a>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${s.title}</div>
            <div style="font-size:11px;color:var(--muted)">${s.module_label || ''}</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;align-items:flex-start;padding-top:2px">
            ${s.size ? `<span class="b ${sizeCls}">${s.size}</span>` : ''}
          </div>
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
